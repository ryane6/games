<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Link Tree</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container for the content */
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        /* Profile/Header Section */
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        /* Button Links Layout */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* The Button Style */
        .link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #334155;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Hover effect when mouse moves over the button */
        .link-btn:hover {
            background-color: #475569;
            border-color: #38bdf8;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Welcome to My Website</h1>
            <p>Check out my links below!</p>
        </div>

        <div class="links-container">
            
            <a href="https://github.com" target="_blank" class="link-btn">My GitHub Profile</a>

            <a href="https://youtube.com" target="_blank" class="link-btn">My YouTube Channel</a>

            <a href="https://twitter.com" target="_blank" class="link-btn">Follow me on X</a>

            <a href="https://google.com" target="_blank" class="link-btn">Visit Google</a>

        </div>
    </div>

</body>
</html>
