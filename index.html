<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaquaviois Thompson</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0c10; /* Deep space dark */
            background-image: 
                radial-gradient(at 50% 20%, rgba(31, 38, 135, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 0%, rgba(102, 51, 153, 0.1) 0px, transparent 50%);
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Container */
        .game-menu {
            width: 100%;
            max-width: 500px;
            background: rgba(26, 26, 36, 0.85);
            border: 2px solid #1f2833;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(102, 252, 241, 0.05);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Title/Header Area */
        .title-container h1 {
            color: #66fcf1; /* Neon Cyan */
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
        }

        .title-container p {
            color: #45a29e;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
        }

        /* Button Grid Layout */
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Gaming Button Styles */
        .game-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #1f2833 0%, #151a22 100%);
            color: #66fcf1;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-left: 4px solid #66fcf1; /* Left neon accent border */
            border-top: 1px solid rgba(102, 252, 241, 0.1);
            border-right: 1px solid rgba(102, 252, 241, 0.1);
            border-bottom: 1px solid rgba(102, 252, 241, 0.1);
            border-radius: 4px;
            transition: all 0.2s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        /* Hover & Active Effects */
        .game-btn:hover {
            color: #ffffff;
            background: #66fcf1;
            border-left: 4px solid #ffffff;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.6);
            transform: scale(1.03);
            cursor: pointer;
        }

        .game-btn:active {
            transform: scale(0.98);
        }

        /* Subtext inside the button (Optional) */
        .btn-desc {
            display: block;
            font-size: 0.75rem;
            color: #45a29e;
            margin-top: 4px;
            text-transform: none;
            letter-spacing: 0.5px;
            font-weight: normal;
            transition: color 0.2s;
        }

        .game-btn:hover .btn-desc {
            color: #0b0c10; /* Makes text readable against neon background on hover */
        }
    </style>
</head>
<body>

    <div class="game-menu">
        <!-- Header Section -->
        <div class="title-container">
            <h1>Select Start</h1>
            <p>Load custom portals</p>
        </div>

        <!-- Gaming Buttons Container -->
        <div class="button-grid">
            
            <!-- Button 1 -->
            <a href="https://ryane6.github.io/basketbattle" target="_blank" class="game-btn">
                Launch BasketBattle
                <span class="btn-desc">Basket Battle is a basketball game</span>
            </a>

            <!-- Button 2 -->
            <a href="https://ryane6.github.io/ai" target="_blank" class="game-btn">
                AI Bot
                <span class="btn-desc">Crackhead you know what a fucking ai is😭</span>
            </a>

            <!-- Button 3 -->
            <a href="https://jaxonm7.github.io/games" target="_blank" class="game-btn">
                Best Friends Website
                <span class="btn-desc">Jaxons gaming website</span>
            </a>

            <!-- Button 4 -->
            <a href="https://discord.gg/9cZdnqxSj" target="_blank" class="game-btn">
                Discord
                <span class="btn-desc">me and jaxons discord</span>
            </a>

        </div>
    </div>

</body>
</html>
